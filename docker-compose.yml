# Локальный запуск "как на продакшене".
# Используй: docker-compose up -d --build
#
# Для production на сервере:
#  - Размести docker-compose.prod.yml с healthcheck'ом и reverse-proxy (nginx/traefik)
#  - Используй .env.production вместо .env.local (без коммита в git!)
#  - Добавь restart: always

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    image: fastscore:latest
    container_name: fastscore-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      # Список переменных — см. .env.example
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/en"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    # Ограничения ресурсов — настрой под свой сервер
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

