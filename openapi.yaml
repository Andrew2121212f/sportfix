  /result/api/v1/sportevents:
    get:
      tags:
        - Result
      summary: Sports Event Results by Tournament
      description: |
        Request for sports event results by `tournamentId`.

        Returns the sports events of the tournament with their results — the
        score of the match. If the match did not take place, the response will
        contain information about the cancellation.
      operationId: GET_result_api_v1_sportevents
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            Start date of selected time frame. Set using Unix Epoch.
        - name: dateTo
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            End date of selected time frame. Set using Unix Epoch.
        - name: lng
          in: query
          description: |
            Two-letter language code in ISO 639-1.

            See [Language Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: string
        - name: ref
          in: query
          required: true
          schema:
            type: integer
            format: int32
            default: 1
          description: |
            Partner ID (this parameter must be specified by your manager).
        - name: tournamentIds
          in: query
          required: true
          schema:
            type: string
          description: |
            Tournament IDs.
        - name: types
          in: query
          schema:
            type: string
          description: |
            Sports event type IDs.

            The default is all types.
        - name: vids
          in: query
          schema:
            type: string
          description: |
            Sports event class IDs. The default is all classes.

            > Some sports (
            `3` (Basketball),
            `28` (Australian Rules),
            `13` (American Football))
            can contain from main sport events with Sports event class = `12`
            (see [Glossary](/en/intro/glossary)).

            > Events that are not main (with the main type (`types` = `1`) and
            the main period (`Periods` = `0`)) will be returned with the main
            class (`vids` = `1`).
