  /datafeed/directories/api/v1/types:
    get:
      tags:
        - Marketing
      summary: Sports Event Type Directory
      description: |
        A list of available sports event types.

        *The list can be supplemented. Contact your manager.
      operationId: GameDataFeed_Directories_API_GET_api_v1_types
      parameters:
        - name: lng
          in: query
          description: |
            Two-letter language code in ISO 639-1.

            See [Language Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: string
            default: en
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/directories-v1-en_TypeGameDtoListResultResource'
              example:
                items:
                  - id: 1
                    name: ''
                  - id: 2
                    name: Corners
                  - id: 8
                    name: Yellow Cards
                  - id: 10
                    name: Cards
                  - id: 12
                    name: Shots On Target
                  - id: 13
                    name: Offsides
                  - id: 14
                    name: Fouls
