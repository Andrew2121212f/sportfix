  /result/api/v1/sports:
    get:
      tags:
        - Result
      summary: Sports with Available Results
      description: |
        A list of sports with completed matches.

        The results for these sports events are available.
      operationId: GET_result_api_v1_sports
      parameters:
        - name: cyberFlag
          in: query
          description: |
            Filter sports in the response:
            * `0` (by default) — all sports except eSports. If entered, the
              response will include all sports with completed matches, except
              eSports.
            * `1` — only eSports. If entered, and if there are eSports results
              available, the response will include eSports.
          schema:
            type: integer
            format: int32
        - name: dateFrom
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            Start date of selected time frame.

            Set using Unix Epoch.
        - name: dateTo
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: |
            End date of selected time frame.

            Set using Unix Epoch.
        - name: lng
          in: query
          description: |
            Two-letter language code in ISO 639-1.

            See [Language Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: string
        - name: ref
          in: query
          required: true
          schema:
            type: integer
            format: int32
          description: |
            Partner ID (this parameter must be specified by your manager).
          default: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/result-v1-en_SportListResultResource'
              example:
                count: 5
                items:
                  - id: 1
                    name: Football
                  - id: 4
                    name: Tennis
                  - id: 3
                    name: Basketball
                  - id: 2
                    name: Ice Hockey
                  - id: 6
                    name: Volleyball
            application/vnd.xenvelop+json:
              schema:
                $ref: '#/components/schemas/result-v1-en_SportListResultResource'
              example:
                count: 5
                items:
                  - id: 1
                    name: Football
                  - id: 4
                    name: Tennis
                  - id: 3
                    name: Basketball
                  - id: 2
                    name: Ice Hockey
                  - id: 6
                    name: Volleyball
  /result/api/v1/tournaments:
