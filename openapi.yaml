          nullable: true
        gameStatus:
          type: integer
          description: |
            Match status:
            * `0` — match in progress
            * `1` — match finished
            * `2` — halftime
            * `4` — match canceled
            * `8` — opponent 1 takes a penalty
            * `16` —  opponent 2 takes a penalty
            * `64` — decision review (VAR)
            * `72` — penalty review (VAR)
          format: int32
