  /datafeed/loadlist/prematch/api/v1/getGameIds:
    get:
      tags:
        - LoadList
      summary: Pre-match Events List
      description: |
        Returns the `sportEventId` of all current sports events.

        **Important**: Please pass these request parameters in the order they
        are listed below.
      operationId: GameDataFeed_Line_Api_GET_loadlist_api_v1_getGameIds
      parameters:
        - name: ref
          in: query
          description: |
            Partner ID (this parameter must be specified by the manager).
          required: true
          schema:
            type: integer
            format: int32
            default: 1
        - name: lastUpdate
          in: query
          description: |
            Update time filter: the response will contain events with an update
            time later than the specified value. Set using Unix Epoch.

            Each subsequent call uses the value specified in the `lastIndex`
            response parameter.
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v1-en_Int32ListResultLastResource'
        '400':
          description: |
            Validation error:
            * A required parameter is not provided.
            * Unknown parameter. *Check the parameter name*.
            * Duplicate parameters in the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v1-en_ProblemDetails'
        '403':
          description: |
            Rule validation failed

            *Check if `ref` is correct in the request*
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v1-en_ProblemDetails'
  /datafeed/loadlist/prematch/api/v1/getDetailsGame:
    get:
      tags:
        - LoadList
      summary: Information about a Sports Event
      description: |
        Retrieves information about an individual sports event.

        > **Important**: Please pass these request parameters in the order they
        are listed below.
      operationId: GameDataFeed_Line_Api_GET_loadlist_api_v1_getDetailsGame
      parameters:
        - name: ref
          in: query
          description: |
            Partner ID (this parameter must be specified by the manager).
          required: true
          schema:
            type: integer
            format: int32
            default: 1
        - name: gr
          in: query
          description: |
            Partner group. 

            Together with the parameter `cnt`:

            * determines whether there is a live video on the bookmaker's website.
            * is used to form the domain part of the link (`link` in the response).

            Consult your manager about the parameter value.
          schema:
            type: integer
            format: int32
            default: 0
        - name: cnt
          in: query
          description: |
            Country or location of the client.

            Makes it possible to determine whether live video is available for a particular country.
            The `hasVideo` flag will only show for sports events that will have streams available on the website for the country specified in the request.

            Together with the parameter `gr` it is used to form the domain part of the link (`link` in the response).

            See [Country Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: integer
            format: int32
            default: 0
        - name: gameId
          in: query
          description: |
            Sports event ID.

            > **Note**: Only a `sportEventId` received in response to the List
            of Events method. The same match will have different sportEventIds
            for pre-match and live.
          required: true
          schema:
            type: integer
            format: int32
        - name: languages
          in: query
          description: |
            Localization languages.

            The list of language codes will only be accepted if they are
            separated by a comma and in alphabetical order.

            For example, `cn,en,ru,tw`.

            The default value is `en`.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v1-en_GameDetailsLoadList'
        '400':
          description: |
            Validation error:
            * A required parameter is not provided.
            * Unknown parameter. *Check the parameter name*.
            * Duplicate parameters in the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v1-en_ProblemDetails'
        '403':
          description: |
            Rule validation failed

            *Check if `ref` and `gr` are correct in the request*
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v1-en_ProblemDetails'
  /datafeed/loadlist/prematch/api/v1/getMarketsGame:
    get:
      tags:
        - LoadList
      summary: Markets
      description: |
        Returns markets by `sportEventId`.

        > **Important**: Please pass these request parameters in the order they
        are listed below.
      operationId: GameDataFeed_Line_Api_GET_loadlist_api_v1_getMarketsGame
      parameters:
        - name: cnt
          in: query
          description: |
            Country or location of the client.

            Makes it possible to determine whether live video is available for a particular country.
            The `hasVideo` flag will only show for sports events that will have streams available on the website for the country specified in the request.

            Together with the parameter `gr` it is used to form the domain part of the link (`link` in the response).

            See [Country Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: integer
            format: int32
            default: 0
        - name: ref
          in: query
          description: |
            Partner ID (this parameter must be specified by the manager)
          required: true
          schema:
            type: integer
            format: int32
            default: 1
        - name: gameId
          in: query
          description: |
            `sportEventId`

            > **Note**: Only a `sportEventId` received in response to the List
