components:
  securitySchemes:
    clientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          scopes: {}
          tokenUrl: https://cpservm.com/gateway/token
      description: |
        1.  You need to request `client_id` and `client_secret` from your
            manager.

            > Important: `client_secret` should only be known to the client
            application and the API.

        1.  Perform the request (described below).
        1.  The response will contain a JWT `access_token`.
        1.  Add it to the header of every GET request:

            Authorization: Bearer `access_token`

        The token has a limited lifetime, which is given in the response
        `expires_in` (in seconds).

        When the token expires, you need to request it again.


        ### Request

        ```sh
        curl \
          -L \
          -X POST \
          https://cpservm.com/gateway/token \
          -H 'Content-Type: application/x-www-form-urlencoded'
          -d 'client_id=test' \
          -d 'client_secret=fDIRK7NDWoRY61MPYoviXrF$J7b7GKHmfd@#v0znvkPtUl9O'
        ```


        ### Response

        ```json
        {
          "access_token": "auth_token",
          "expires_in": 3600
        }
        ```

        > See
        [RFC 6749](https://datatracker.ietf.org/doc/html/rfc6749#section-4.4),
        "Client Credentials", to learn how to access resources using OAuth 2.0.
  schemas:
    line-v2-en_SchemeOfGettingOddsOperations:
      enum:
        - GetAllOdds
        - GetMainOdds
        - Get1X2Odds
      type: string
    line-v2-en_OddDtoV2:
      x-tags:
        - Models
      title: Market
      type: object
      properties:
        type:
          type: integer
          description: |
            Market ID.
          format: int64
          example: 1
        parameter:
          type: number
          description: |
            Numeric parameter of the market.
          format: double
        oddsMarket:
          type: number
          description: |
            Market odds.
          format: double
        playerId:
          type: integer
          description: |
            Player ID in the market.
          format: int64
        playerName:
          type: string
          description: |
            The player's localized name in the market (in the language of the
            request).
          nullable: true
        isBlocked:
          type: boolean
          description: |
            The parameter for blocking the market odds. Bets cannot be accepted
            on a blocked market:
            * `true` — blocked,
            * `false` — not blocked.
        display:
          type: string
          description: |
            Localized name of the market (in the language of the request).

            For example: Total over (0.5), Lewandowski to score over (0.5)
            goals.
          nullable: true
        isCenter:
          type: boolean
          description: |
            Designates a central market. Example: if a sports event has a list
            of totals with the parameters 1.5, 2.5, 3.5 and 4.5, "Total 2.5"
            will be the central market.

            Only central total and handicap markets will be marked `true` in the
            response.
      additionalProperties: false
      description: Markets
      example:
        type: 9
        parameter: 0.5
        oddsMarket: 1.015
        playerId: 0
        playerName: ''
        isBlocked: false
        display: Total Under (0.5)
        isCenter: false
    line-v2-en_LocalizationMatchInfoObject:
      type: object
      properties:
        tournamentStage:
          type: string
          description: |
            Tournament stage.

            Example: `1/16 finals`.
          nullable: true
        matchFormat:
          type: string
          description: |
            Match format.
          nullable: true
        seriesScore:
          type: string
          description: |
            Series score.
          nullable: true
        surface:
          type: string
          description: |
            Stadium surface.
          nullable: true
        locationCountry:
          type: string
          description: |
            Country of the event.
          nullable: true
        locationCity:
          type: string
          description: |
            City of the event.
          nullable: true
          example: London
        location:
          type: string
          description: |
            Venue of the event.
          nullable: true
      additionalProperties: false
      description: Tournament information
    line-v2-en_LocalizationStadiumInfoObject:
      type: object
      properties:
        id:
          type: integer
          description: |
            Stadium ID.
          format: int32
        name:
          type: string
          description: |
            Stadium name.
          nullable: true
        locationAdress:
          type: string
          description: |
            Stadium address.
          nullable: true
        surface:
          type: string
          description: |
            Stadium surface.
          nullable: true
      additionalProperties: false
      description: |
        Stadium info
    line-v2-en_LocalizationSportEventDtoV2:
      x-tags:
        - Models
      title: Prematch sport event
      type: object
      properties:
        sportEventId:
          type: integer
          description: |
            Sport event ID.

            > One match can contain multiple events with different
            `sportEventId`, different `period` and/or `type` but the same
            `mainConstSportEventId`.

            See [Getting all sport events match](/en/getEvents/loadsingle).
          format: int64
        mainConstSportEventId:
          type: integer
          description: |
            General ID: all the events (with different `sportEventIds`) within
            one match will use the same `mainConstSportEventId`.

            > **Note**: a single match will have different `sportEventIds` for
            pre-match and live. To find an event from pre-match in live once the
            match has begun, use `constSportEventId`.
          format: int64
        constSportEventId:
          type: integer
          description: |
            General sports event ID for pre-match and live.
          format: int64
        tournamentId:
          type: integer
          description: |
            Tournament ID.
          format: int64
        sportId:
          type: integer
          description: |
            Sport ID.
          format: int64
        subSportId:
          type: integer
          description: |
            Discipline ID.

            > Only relevant for esports; for the rest, `0` will be returned.
          format: int64
        tournamentNameLocalization:
          type: string
          description: |
            Localized name of the tournament (in the language of the request).
          nullable: true
        opponent1NameLocalization:
          type: string
          description: |
            Localized name of the opponent 1 (in the language of the request).
          nullable: true
        opponent2NameLocalization:
          type: string
          description: |
            Localized name of the opponent 2 (in the language of the request).
          nullable: true
        imageOpponent1:
          type: array
          items:
            type: string
          description: |
            Array of image names for opponent 1 (two items will be returned for
            pair sports).

            > See [Loading Images](/en/intro/downloads).
          nullable: true
        imageOpponent2:
          type: array
          items:
            type: string
          description: |
            Array of image names for opponent 2 (two items will be returned for
            pair sports).

            > See [Loading Images](/en/intro/downloads).
          nullable: true
        type:
          type: integer
          description: |
            Sports event type ID.

            The main sports event type has a value of 1.
          format: int64
        vid:
          type: integer
          description: |
            Sports event class ID.

            The main sports event class has a value of 1.
          format: int64
        period:
          type: integer
          description: |
            Number of the period in the sports event.

            The main sports event has a value of 0.
          format: int64
        periodName:
          type: string
          description: |
            Localized name of the period (in the language of the request),
            with a number assigned. For example: 1 half, 1 quarter, etc.
          nullable: true
        startDate:
          type: integer
          description: |
            Start date of the sports event in Unix Epoch format.
          format: int64
        link:
          type: string
          description: |
            Link to a sports event on the bookmaker's website.

            If the `partnerLink` parameter is included in a request, the domain part of the link will be replaced:

            * `https://{new value}&r={link path to sports event on the bookmaker's website}`
            * `https://ref.top/L?tag=s_23283m_355c&r=/ru/live/Football/1299397-England-Premier-League-2/351754042-Crystal-Palace-U23-Liverpool-U23`

            If the `partnerLink` is not provided, the domain part of the link will be formed based on the group (`gr`) and the country (`cnt`).
          nullable: true
        oddsLocalization:
          type: array
          items:
            $ref: '#/components/schemas/line-v2-en_OddDtoV2'
          description: |
            Markets.
          nullable: true
        tournamentImage:
          type: array
          items:
            type: string
          description: |
            Tournament image name (for downloading).

            > See [Loading Images](/en/intro/downloads).
          nullable: true
        opponent1Ids:
          type: array
          items:
            type: integer
            format: int32
          description: |
            ID of the 1st opponent.

            > Two elements will be returned for pair sports.
          nullable: true
        opponent2Ids:
          type: array
          items:
            type: integer
            format: int32
          description: |
            ID of the 2nd opponent.

            > Two elements will be returned for pair sports.
          nullable: true
        hasVideo:
          type: boolean
          description: |
            Specifies whether a sports event will have video in Live.
        waitingLive:
          type: boolean
          description: |
            Shows that a live sports event will be available for this match.

            > **Note**: `hasLive` = `true` does not guarantee that the match
            will take place.
        matchInfoObject:
          $ref: '#/components/schemas/line-v2-en_LocalizationMatchInfoObject'
        stadiumInfoObject:
          $ref: '#/components/schemas/line-v2-en_LocalizationStadiumInfoObject'
        statGameId:
          type: string
          description: |
            Game ID to get additional information from the
            Statistics service, for example, team/opponent's recent match
            statistics.
          nullable: true
        hasInsights:
          type: boolean
          description: |
            Indicates whether insights are available for the main game or its subgames.

            > Returned only for the main game.
      additionalProperties: false
      description: Sports event info
      example:
        sportEventId: 410430571
        mainConstSportEventId: 151085309
        constSportEventId: 151085309
        tournamentId: 88637
        sportId: 1
        subSportId: 0
        tournamentNameLocalization: England. Premier League
        opponent1NameLocalization: Brentford
        opponent2NameLocalization: Tottenham Hotspur
        imageOpponent1:
          - 2064.png
        imageOpponent2:
          - 1984.png
        tournamentImage: []
        opponent1Ids:
          - 1818071
        opponent2Ids:
          - 4106497
        type: 1
        vid: 1
        period: 0
