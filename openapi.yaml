                    startDate: 1625683500
                    opponent1Ids:
                      - 1876015
                    opponent2Ids:
                      - 2868499
                  - sportEventId: 312610305
                    constSportEventId: 106700563
                    opponent1NameLocalization: England
                    opponent2NameLocalization: Denmark
                    imageOpponent1:
                      - 12763.png
                    imageOpponent2:
                      - c74e2857cc52f1f884e4d9204e9c19a5.png
                    type: 2
                    vid: 1
                    score: 3:3 (1:1,2:2)
                    startDate: 1625683500
                    opponent1Ids:
                      - 1834515
                    opponent2Ids:
                      - 2863495
                  - sportEventId: 312612579
                    constSportEventId: 106709909
                    opponent1NameLocalization: England
                    opponent2NameLocalization: Denmark
                    imageOpponent1:
