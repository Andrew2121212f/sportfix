openapi: 3.0.1
info:
  version: '1.13'
  title: Marketing API
  description: |
    The API allows you to receive sports events, markets for them and the result
    of the match — its score, as well as referral links that will send users
    from your application to the bookmaker's website so they can take part in
    the referral programme.

    **Return data format**: JSON

    > **Important**: one real-world match in this API corresponds to different
    > sports events:
    > *   for pre-match and live
    > *   for different match periods
    > *   for additional markets not on the outcome of the match (types of
    >     sports events)

    *   [Glossary](/en/intro/glossary)
    *   How to get all sports events of a match:
        *   [LoadSingle](/en/intro/getEvents/loadsingle)
        *   [LoadList](/en/intro/getEvents/loadlist)
        *   [LoadTree](/en/intro/getEvents/loadtree)
    *   How to get sport event results:
        *   [Result](/en/intro/result)
    *   How to get statistics:
        *   [Statistics](/en/intro/MarketingStatisticFeed)
servers:
  - url: https://cpservm.com/gateway/marketing
security:
  - clientCredentials: []
tags:
  - name: LoadSingle
    description: |
      Sports events `LoadSingle`

      > If any of the methods return a 403 error, request access to `LoadSingle`
      from your manager.
  - name: LoadList
    description: |
      Sports events `LoadList`

      > If any of the methods return a 403 error, request access to `LoadList`
      from your manager.
  - name: LoadTree
    description: |
      Sports events `LoadTree`

      > If any of the methods return a 403 error, request access to `LoadTree`
      from your manager.
  - name: Result
    x-displayName: Results
    description: |
      Match results.

      Restrictions apply to all methods:
      * **Minimum** difference between `dateFrom` and `dateTo` is 1 minute.
      * **Maximum** between `dateFrom` and `dateTo` is 48 hours.
  - name: Marketing
    x-displayName: Dictionaries
    description: |
      Dictionaries.
  - name: Models
    description: |
      See [Glossary](/en/intro/glossary) to find out more about the meaning
      of terms mentioned below.
  - name: Statistics
    description: Statistics
paths:
  /datafeed/prematch/api/v2/sportevents:
    get:
      tags:
        - LoadSingle
      summary: Get Pre-Match Sports Events
      description: |
        **Request limit**: No more than 1 identical* request every 20 seconds
        from 1 client application. This is necessary to evenly distribute the
        resources of the API service and protect it from overload.

        <details>
          <summary>
            *An identical request is a request with the same set and parameter
            values.
          </summary>

          <div>
            The requests below are identical:

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'Periods=1,2,3' \
              -d 'SportIds=1,2,3'
            ```

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'Periods=1,2,3' \
              -d 'SportIds=1,2,3'
            ```

            Requests below are not identical:

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'SportEventIds=12345'
            ```

            ```sh
            curl \
              -L \
              -G \
              https://cpservm.com/gateway/marketing/datafeed/prematch/api/v2/sportevents \
              -d 'Ref=1' \
              -d 'SportEventIds=54321'
            ```
          </div>
        </details>
      operationId: GameDataFeed_Line_Api_GET_loadsingle_api_v2_sportevents
      parameters:
        - name: ref
          in: query
          description: |
            Partner ID (this parameter must be specified by your manager).
          required: true
          schema:
            type: integer
            format: int32
            default: 1
        - name: gr
          in: query
          description: |
            Partner group.

            Together with the parameter `cnt`:

            * determines whether there is a live video on the bookmaker's website.
            * if the `partnerLink` parameter is not provided, it is used to form the domain part of the link (`link` in the response).

            Consult your manager about the parameter value.
          schema:
            type: integer
            format: int32
        - name: cnt
          in: query
          description: |
            Country or location of the client.

            Makes it possible to determine whether live video is available for a particular country.
            The `hasVideo` flag will only show for sports events that will have streams available on the website for the country specified in the request.

            If the `partnerLink` parameter is not provided, it is used together with the parameter `gr` to form the domain part of the link (`link` in the response).

            See [Country Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: integer
            format: int32
        - name: lng
          in: query
          description: |
            Two-letter language code in ISO 639-1.

            See [Language Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: string
        - name: periods
          in: query
          description: |
            Sports event period numbers separated by a comma. Default setting is
            always `0` (main period, the list of markets on the outcome of the
            match taking all periods into account). To get all possible periods,
            enter `0`, `1`, `2`, ... (the number of periods depends on the
            sport).
          schema:
            type: string
        - name: vids
          in: query
          description: |
            Sports event class IDs separated by a comma. Default setting is
            always `1` (main class).

            > Some sports (`3` (Basketball), `28` (Australian Rules),
            `13` (American Football)) can contain from main sport events with
            Sports event class = `12` (see [Glossary](/en/intro/glossary)).
            Please add `Vids` = `12` to get these sports events.

            > Events that are not main (with the main type (`Types` = `1`) and
            the main period (`Periods` = `0`)) will be returned with the main
            class (`Vids` = `1`).
          schema:
            type: string
        - name: types
          in: query
          description: |
            Sports event type IDs separated by a comma.

            Default setting is always `1` (main type).
          schema:
            type: string
        - name: sportEventIds
          in: query
          description: |
            Sports event IDs separated by a comma.

            > **Note**: can be entered as `sportEventId` or as
            `constSportEventId` (the overall event ID for pre-match and live
            events). Use `constSportEventId` to find a live match from the
            pre-match once it has already begun.
          schema:
            type: string
        - name: tournamentIds
          in: query
          description: |
            Tournament IDs separated by a comma.

            By default, all tournaments will be included.
          schema:
            type: string
        - name: tournamentCountryIds
          in: query
          description: |
            Tournament host country IDs separated by a comma.

            Accepts `id` from the
            [Country Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: string
        - name: sportIds
          in: query
          description: |
            Sport IDs separated by a comma.

            By default, all sports in the directory will be included.
          schema:
            type: string
        - name: subSportIds
          in: query
          description: |
            Discipline IDs separated by a comma.
          schema:
            type: string
        - name: gtStart
          in: query
          description: |
            Time filter for sports events, where the event`s start date must be
            greater than the specified value.

            Set using Unix Epoch.
          schema:
            type: integer
            format: int64
        - name: ltStart
          in: query
          description: |
            Time filter for sports events, where the event`s start date must be
            less than the specified value.

            Set using Unix Epoch.
          schema:
            type: integer
            format: int64
        - name: oddsIds
          in: query
          description: |
            Sports event market IDs (from the directory) separated by a comma.

            This enables you to obtain specific markets within a sports event.
          schema:
            type: string
        - name: schemeOfGettingOddsOperations
          in: query
          description: |
            > [Markets filter](/en/intro/schemeOfGettingOdds#schemeofgettingoddsoperations).
          schema:
            $ref: '#/components/schemas/line-v2-en_SchemeOfGettingOddsOperations'
        - name: video
          in: query
          description: |
            Video filter.

            * If `true` — only sports events will be returned in response with
              video broadcasts available after the start of the event in live
              (`hasVideo` = `true`)
            * If `false` (default) — all sporting events will come (both with
              video and without)

            > See `count` parameter.
          schema:
            type: boolean
        - name: partnerLink
          in: query
          description: |
            An affiliate link that replaces a link to a sports event in the
            response.

            Format: `{link path including domain}?tag={tag}`

            Example: *ref.top/L?tag=s_23283m_355c_*

            If a value is entered, all links (`link` response parameter) will
            be replaced:
            * `https://{new value}
              &r={link path to sports event on the bookmaker's website}`
            * `https://ref.top/L?tag=s_23283m_355c&r=/ru/live/Football
              /1299397-England-Premier-League-2/351754042-Crystal-Palace-U23
              -Liverpool-U23`

            Contact your manager to find out how to get an affiliate link in
            your account.
          schema:
            type: string
        - name: opponentIds
          in: query
          description: |
            Opponent's IDs separated by a comma. The response will only contain
            sports events with participants whose IDs are specified in the
            request.
          schema:
            type: string
        - name: count
          in: query
          description: |
            The maximum number of sports events to be returned in the response.

            The default is `100`.

            If `count` is specified, the service will take `count` events and
            filter them using the `hasVideo` flag. As a result, the response
            may contain fewer events than specified.
          schema:
            type: integer
            format: int32
            default: 100
        - name: cnt
          in: query
          description: |
            Country or location of the client.

            Makes it possible to determine whether live video is available for a particular country.
            The `hasVideo` flag will only show for sports events that will have streams available on the website for the country specified in the request.

            If the `partnerLink` parameter is not provided, it is used together with the parameter `gr` to form the domain part of the link (`link` in the response).

            See [Country Directory](/en/api-en#tag/Marketing/operation/GameDataFeed_Directories_API_GET_api_v1_language).
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v2-en_LocalizationSportEventDtoV2ListResultResource'
        '400':
          description: |
            Validation error:
            * A required parameter is not provided
            * Unknown parameter. *Check the parameter name*
            * Duplicate parameters in the request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v2-en_ProblemDetails'
        '403':
          description: |
            Rule validation failed

            *Check if `ref` and `gr` are correct in the request*
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/line-v2-en_ProblemDetails'
