    live-v2-en_LocalizationSportEventDtoV2:
      x-tags:
        - Models
      title: Live sport event
      type: object
      properties:
        sportEventId:
          type: integer
          description: |
            Sport event ID.

            > One match can contain multiple events with different
            `sportEventId`, different `period` and/or `type` but the same
            `mainConstSportEventId`.

            See [Getting all sport events match](/en/getEvents/loadsingle).
          format: int64
        mainConstSportEventId:
          type: integer
          description: |
            General ID: all the events (with different `sportEventIds`) within
            one match will use the same `mainConstSportEventId`.

            > **Note**: a single match will have different `sportEventIds` for
            pre-match and live. To find an event from pre-match in live once the
            match has begun, use `constSportEventId`.
          format: int64
        constSportEventId:
          type: integer
          description: |
            General sports event ID for pre-match and live.
          format: int64
        tournamentId:
          type: integer
          description: |
            Tournament ID.
          format: int64
        sportId:
          type: integer
          description: |
            Sport ID.
          format: int64
        subSportId:
          type: integer
          description: |
            Discipline ID.

            Only relevant for esports; for the rest, `0` will be returned.
          format: int64
        tournamentNameLocalization:
          type: string
          description: |
            Localized name of the tournament (in the language of the request).
          nullable: true
        opponent1NameLocalization:
          type: string
          description: |
            Localized name of the opponent 1 (in the language of the request).
          nullable: true
        opponent2NameLocalization:
          type: string
          description: |
            Localized name of the opponent 2 (in the language of the request).
          nullable: true
        imageOpponent1:
          type: array
          items:
            type: string
          description: |
            Array of image names for opponent 1 (two items will be returned for
            pair sports).

            > See [Loading Images](/en/intro/downloads).
          nullable: true
        imageOpponent2:
          type: array
          items:
            type: string
          description: |
            Array of image names for opponent 2 (two items will be returned for
            pair sports).

            > See [Loading Images](/en/intro/downloads).
          nullable: true
        type:
          type: integer
          description: |
            Sports event type ID.

            The main sports event type has a value of 1.
          format: int64
        vid:
          type: integer
          description: |
            Sports event class ID.

            The main sports event class has a value of 1.
          format: int64
        period:
          type: integer
          description: |
            Number of the period in the sports event.

            The main sports event has a value of 0.
          format: int64
        periodName:
          type: string
          description: |
            Localized name of the period (in the language of the request),
            with a number assigned. For example: 1 half, 1 quarter, etc.
          nullable: true
        startDate:
          type: integer
          description: |
            Start date of the sports event in Unix Epoch format.
          format: int64
        link:
          type: string
          description: |
            Link to a sports event on the bookmaker's website.

            If the `partnerLink` parameter is included in a request, the domain part of the link will be replaced:

            * `https://{new value}&r={link path to sports event on the bookmaker's website}`
            * `https://ref.top/L?tag=s_23283m_355c&r=/ru/live/Football/1299397-England-Premier-League-2/351754042-Crystal-Palace-U23-Liverpool-U23`

            If the `partnerLink` is not provided, the domain part of the link will be formed based on the group (`gr`) and the country (`cnt`).
          nullable: true
        oddsLocalization:
          type: array
          items:
            $ref: '#/components/schemas/live-v2-en_OddDtoV2'
          description: |
            Markets.
          nullable: true
        gameStatus:
          type: integer
          description: |
            Match status:
            * `0` — match in progress
            * `1` — match finished
            * `2` — halftime
            * `4` — match canceled
            * `8` — opponent 1 takes a penalty
            * `16` —  opponent 2 takes a penalty
            * `64` — decision review (VAR)
            * `72` — penalty review (VAR)
          format: int32
        fullScore:
          $ref: '#/components/schemas/live-v2-en_ScoreDto'
        curScore:
          $ref: '#/components/schemas/live-v2-en_ScoreDto'
        periodScores:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/live-v2-en_ScoreDto'
          description: |
            Scores by period. Item 0 is the total score of a sports event,
            followed by the score for a specific period.
          nullable: true
        timeSec:
          type: integer
          description: |
            Time elapsed in seconds since the start of the sports event.

            `0` is returned for those sports where there is no time.
          format: int32
        hasVideo:
          type: boolean
          description: |
            Specifies whether a sports event has video.
        currentPeriodName:
          type: string
          description: |
            The name of the current period of the sports event. Specific to the
            type of sport. Filled in only for the main game.
          nullable: true
        lineConstId:
          type: integer
          description: |
            Refers to the `constSportEventId` identifier used in Prematch when
            searching for a sports event.

            Provided only if there's a change in `constSportEventId` during live
            events.
          format: int64
          nullable: true
        tournamentImage:
          type: array
          items:
            type: string
          description: |
            Tournament image name (for downloading).

            > See [Loading Images](/en/intro/downloads).
          nullable: true
        opponent1Ids:
          type: array
          items:
            type: integer
            format: int32
          description: |
            ID of the 1st opponent.

            > Two elements will be returned for pair sports.
          nullable: true
        opponent2Ids:
          type: array
          items:
            type: integer
            format: int32
          description: |
            ID of the 2nd opponent.

            > Two elements will be returned for pair sports.
          nullable: true
        matchInfoObject:
          $ref: '#/components/schemas/live-v2-en_LocalizationMatchInfoObject'
        stadiumInfoObject:
          $ref: '#/components/schemas/live-v2-en_LocalizationStadiumInfoObject'
        statGameId:
          type: string
          description: |
            Game ID to get additional information from the
            Statistics service, for example, team/opponent's recent match
            statistics.
          nullable: true
      additionalProperties: false
      description: Sports event info
      example:
